<!DOCTYPE html>
<html>
<head>
<title>Roblox Dev Hub</title>

<style>
body {
margin: 0;
background: #0a0a12;
color: white;
font-family: Arial;
}

.container {
max-width: 700px;
margin: 50px auto;
padding: 20px;
}

.card {
background: #151525;
padding: 20px;
border-radius: 15px;
box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

h1 {
margin-bottom: 5px;
}

input, select {
width: 100%;
padding: 12px;
margin-top: 10px;
border-radius: 10px;
border: none;
outline: none;
background: #0f0f1a;
color: white;
}

button {
margin-top: 10px;
width: 100%;
padding: 12px;
border: none;
border-radius: 10px;
background: #4c6fff;
color: white;
cursor: pointer;
font-weight: bold;
}

button:hover {
background: #3a56cc;
}

.output {
margin-top: 20px;
background: #0f0f1a;
padding: 15px;
border-radius: 10px;
min-height: 80px;
white-space: pre-wrap;
}

.history {
margin-top: 20px;
opacity: 0.8;
font-size: 14px;
}

.item {
padding: 5px 0;
border-bottom: 1px solid #222;
}

.small {
font-size: 12px;
opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
<div class="card">
<h1>Roblox Dev Hub</h1>
<div class="small">AI-style tool for Roblox creators</div>

<select id="type">
<option value="idea">Game Idea</option>
<option value="script">Script System</option>
<option value="pets">Pet Names</option>
<option value="economy">Economy Balance</option>
</select>

<input id="input" placeholder="Type your idea... (e.g. pet simulator, sword game, etc)">

<button onclick="generate()">Generate</button>

<div class="output" id="output">Your results will appear here...</div>

<div class="history">
<b>History</b>
<div id="history"></div>
</div>
</div>
</div>

<script>
let history = [];

function generate() {
let type = document.getElementById("type").value;
let input = document.getElementById("input").value;
let output = document.getElementById("output");

let result = "";

if (type === "idea") {
result = "Game Idea: A " + input + " simulator where players upgrade tools, unlock zones, and collect rare items.";
}

if (type === "script") {
result = "Script System: " + input + " system using leaderstats + remote events + datastore saving.";
}

if (type === "pets") {
result = "Pet Names for " + input + ": Neon Fox, Crystal Wolf, Shadow Dragon, Cosmic Bunny, Lava Tiger";
}

if (type === "economy") {
result = "Economy Balance: Start cheap upgrades, exponential scaling (x1.5–x2 per upgrade), rebirth resets with multiplier.";
}

output.innerText = result;

history.unshift(result);
if (history.length > 5) history.pop();

renderHistory();
}

function renderHistory() {
let h = document.getElementById("history");
h.innerHTML = history.map(item => `<div class='item'>${item}</div>`).join("");
}
</script>

</body>
</html>
