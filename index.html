<!DOCTYPE html>
<html>
<head>
<title>Roblox Dev Hub</title>

<style>
body {
margin: 0;
font-family: Arial;
background: linear-gradient(135deg, #0a0a12, #11112a);
color: white;
}

.nav {
padding: 15px 25px;
background: #0f0f1a;
display: flex;
justify-content: space-between;
align-items: center;
}

.logo {
font-weight: bold;
color: #4c6fff;
}

.container {
max-width: 800px;
margin: 60px auto;
padding: 20px;
}

.card {
background: rgba(255,255,255,0.05);
padding: 25px;
border-radius: 15px;
backdrop-filter: blur(10px);
}

h1 {
margin-top: 0;
}

input, select {
width: 100%;
padding: 12px;
margin-top: 10px;
border-radius: 10px;
border: none;
background: #0f0f1a;
color: white;
}

button {
width: 100%;
margin-top: 10px;
padding: 12px;
border: none;
border-radius: 10px;
background: #4c6fff;
color: white;
font-weight: bold;
cursor: pointer;
}

button:hover {
background: #3a56cc;
}

.output {
margin-top: 20px;
background: #0f0f1a;
padding: 15px;
border-radius: 10px;
min-height: 80px;
white-space: pre-wrap;
}

.tagline {
opacity: 0.8;
margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="nav">
<div class="logo">Roblox Dev Hub</div>
<div>AI Tools for Roblox Creators</div>
</div>

<div class="container">
<div class="card">
<h1>Build Roblox Games Faster</h1>
<div class="tagline">Generate scripts, ideas, and systems instantly</div>

<select id="type">
<option value="idea">Game Idea</option>
<option value="script">Script System</option>
<option value="pets">Pet Names</option>
<option value="economy">Economy Balance</option>
</select>

<input id="input" placeholder="Type your idea (e.g. zombie survival, pet sim, sword game)">

<button onclick="generate()">Generate</button>

<div class="output" id="output">Your results will appear here...</div>
</div>
</div>

<script>
function generate() {
let type = document.getElementById("type").value;
let input = document.getElementById("input").value;
let output = document.getElementById("output");

let result = "";

if (type === "idea") {
result = "Game Idea:\nA " + input + " game where players upgrade, unlock zones, and collect rare items.";
}

if (type === "script") {
result = "Script System:\n" + input + " system using leaderstats + RemoteEvents + DataStore saving.";
}

if (type === "pets") {
result = "Pet Names:\nNeon Fox, Crystal Wolf, Shadow Dragon, Cosmic Bunny, Lava Tiger";
}

if (type === "economy") {
result = "Economy Balance:\nStart cheap upgrades, exponential scaling, rebirth multiplier system.";
}

output.innerText = result;
}
</script>

</body>
</html>
