<!DOCTYPE html>
<html>
<head>
    <title>Roblox Dev Hub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #1a1a3a, #0a0a12 60%);
            color: white;
        }

        /* Top bar */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            background: rgba(20, 20, 40, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
            color: #8a7bff;
            text-shadow: 0 0 10px rgba(138,123,255,0.5);
        }

        .tag {
            opacity: 0.7;
            font-size: 13px;
        }

        /* Layout */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 22px;
            border-radius: 18px;
            margin-bottom: 18px;
            backdrop-filter: blur(14px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h2 {
            margin-top: 0;
        }

        /* Buttons */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #6a5cff, #4c6fff);
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(76,111,255,0.4);
        }

        /* Input */
        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 12px;
            border: none;
            background: rgba(0,0,0,0.4);
            color: white;
            outline: none;
        }

        /* Output */
        .output {
            margin-top: 10px;
            background: rgba(0,0,0,0.35);
            padding: 16px;
            border-radius: 12px;
            min-height: 120px;
            white-space: pre-wrap;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .subtitle {
            opacity: 0.7;
            font-size: 13px;
        }

        /* Glow accent line */
        .glow {
            height: 2px;
            width: 100%;
            background: linear-gradient(90deg, transparent, #7a6cff, transparent);
            margin: 10px 0;
        }
    </style>
</head>

<body>

<div class="nav">
    <div class="logo">⚡ Roblox Dev Hub</div>
    <div class="tag">Build smarter. Ship faster.</div>
</div>

<div class="container">

    <div class="card">
        <h2>Tool Selection</h2>
        <div class="subtitle">Choose what you want to generate</div>

        <div class="glow"></div>

        <div class="grid">
            <button onclick="setTool('economy')">💰 Economy</button>
            <button onclick="setTool('idea')">🎮 Game Ideas</button>
            <button onclick="setTool('xp')">📊 XP Curve</button>
            <button onclick="setTool('script')">🧱 Scripts</button>
        </div>
    </div>

    <div class="card">
        <h2>Input</h2>
        <input id="input" placeholder="Example: zombie simulator">
        <button onclick="generate()">Generate</button>
    </div>

    <div class="card">
        <h2>Output</h2>
        <div class="output" id="output">Your results will appear here...</div>
    </div>

</div>

<script>
let tool = "economy";

function setTool(t) {
    tool = t;
    document.getElementById("output").innerText = "Selected tool: " + t;
}

function generate() {
    let input = document.getElementById("input").value;
    let output = document.getElementById("output");

    if (tool === "economy") {
        output.innerText =
        "💰 Economy System\n\nBase: " + input +
        "\nScaling: x1.5 per upgrade\nRebirth bonus: +10% per rebirth\n\nTip: Start slow, scale smoothly.";
    }

    if (tool === "idea") {
        output.innerText =
        "🎮 Game Idea\n\nA " + input + " game where players upgrade tools, unlock zones, and collect rare items.";
    }

    if (tool === "xp") {
        output.innerText =
        "📊 XP Curve\n\nXP = level² * 100\nUse exponential scaling for progression control.";
    }

    if (tool === "script") {
        output.innerText =
        "🧱 Script System\n\nFor " + input + " use:\nLeaderstats + DataStore + RemoteEvents";
    }
}
</script>

</body>
</html>
